{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Farming | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a2e1a 0%, #1a5c35 50%, #0f3d22 100%);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            background: white; border-radius: 20px; padding: 48px 44px;
            width: 100%; max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeUp 0.4s ease;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .card-icon {
            width: 64px; height: 64px; background: rgba(37,162,68,0.1);
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; margin: 0 auto 20px;
        }
        .card-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: #0a2e1a; text-align: center; margin-bottom: 8px; }
        .card-subtitle { font-size: 14px; color: #8fa99a; text-align: center; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #1e2e28; margin-bottom: 7px; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #8fa99a; font-size: 14px; }
        .form-group input {
            width: 100%; padding: 12px 14px 12px 40px;
            border: 1.5px solid #d8e2dc; border-radius: 10px;
            font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: all 0.2s;
        }
        .form-group input:focus { border-color: #25a244; box-shadow: 0 0 0 3px rgba(37,162,68,0.1); }
        .toggle-password {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: #8fa99a; font-size: 14px; cursor: pointer; background: none; border: none;
        }
        .errorlist { list-style: none; padding: 0; margin-bottom: 14px; }
        .errorlist li { color: #c0392b; font-size: 12px; padding: 4px 0; }
        .btn {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #25a244, #4cca6e);
            color: white; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif;
            cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(37,162,68,0.35);
        }
        .btn:hover { transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-icon">🔑</div>
        <div class="card-title">Set New Password</div>
        <div class="card-subtitle">Enter your new password below</div>
        <form method="POST">
            {% csrf_token %}
            {% if form.errors %}
                <ul class="errorlist">
                    {% for field in form %}{% for error in field.errors %}<li><i class="fas fa-exclamation-circle"></i> {{ error }}</li>{% endfor %}{% endfor %}
                </ul>
            {% endif %}
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="new_password1" id="pass1" placeholder="Enter new password" required>
                    <button type="button" class="toggle-password" onclick="togglePass('pass1','eye1')"><i class="fas fa-eye" id="eye1"></i></button>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="new_password2" id="pass2" placeholder="Confirm new password" required>
                    <button type="button" class="toggle-password" onclick="togglePass('pass2','eye2')"><i class="fas fa-eye" id="eye2"></i></button>
                </div>
            </div>
            <button type="submit" class="btn"><i class="fas fa-save"></i> Save New Password</button>
        </form>
    </div>
<script>
function togglePass(id, iconId) {
    const input = document.getElementById(id);
    const icon = document.getElementById(iconId);
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
</script>
</body>
</html>
