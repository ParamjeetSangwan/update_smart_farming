{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Farming | Password Reset Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            background: linear-gradient(135deg, #0a2e1a 0%, #1a5c35 50%, #0f3d22 100%);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            background: white; border-radius: 20px; padding: 48px 44px;
            width: 100%; max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
            animation: fadeUp 0.4s ease;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .success-icon {
            width: 72px; height: 72px; background: rgba(37,162,68,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 32px; margin: 0 auto 20px;
        }
        .card-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: #0a2e1a; margin-bottom: 10px; }
        .card-text { font-size: 14px; color: #8fa99a; line-height: 1.7; margin-bottom: 28px; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 13px 32px;
            background: linear-gradient(135deg, #25a244, #4cca6e);
            color: white; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif;
            cursor: pointer; text-decoration: none;
            box-shadow: 0 4px 14px rgba(37,162,68,0.35); transition: all 0.2s;
        }
        .btn:hover { transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon">✅</div>
        <div class="card-title">Password Reset!</div>
        <div class="card-text">Your password has been successfully reset. You can now sign in with your new password.</div>
        <a href="{% url 'login' %}" class="btn"><i class="fas fa-sign-in-alt"></i> Sign In Now</a>
    </div>
</body>
</html>
